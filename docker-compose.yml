services:
  app:
    build: .
    depends_on:
       db:
          condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=weather_app
      - DB_PASSWORD=Hestehop11235!
      - DB_NAME=weather_db

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=weather_app
      - POSTGRES_PASSWORD=Hestehop11235!
      - POSTGRES_DB=weather_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U weather_app -d weather_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data: